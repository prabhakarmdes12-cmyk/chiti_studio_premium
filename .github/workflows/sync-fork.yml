name: Sync to Public Fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to fork
        run: |
          git remote add fork https://${{ secrets.FORK_TOKEN }}@github.com/chititech-web/Chiti_Technologies_v3.git
          git push fork main
